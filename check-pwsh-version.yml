- hosts: paz
  gather_facts: no
  tasks:
    - name: Verificar versao do PowerShell 7
      ansible.windows.win_shell: |
        $pwsh = Get-Command pwsh -ErrorAction Stop
        & $pwsh.Source -NoLogo -NoProfile -Command '$PSVersionTable.PSVersion.ToString()'
      args:
        executable: powershell
      register: pwsh_version

    - name: Exibir versao
      debug:
        msg: "{{ inventory_hostname }}: {{ pwsh_version.stdout | trim }}"
