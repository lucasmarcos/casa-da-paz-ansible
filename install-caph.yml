- name: Install Caph
  hosts: paz
  gather_facts: false
  vars:
    caph_local_path: /home/lucas/Downloads/caph-1.1-mingw32.zip
    caph_remote_path: '{{ windows_temp_dir }}\caph-1.1-mingw32.zip'
    caph_install_dir: '{{ desktop_dir }}\Caph'
    caph_binary_path: '{{ caph_install_dir }}\caph-1.1-mingw32\bin\caph.exe.exe'
    caph_shortcut_path: '{{ desktop_dir }}\Caph.lnk'

  tasks:
    - name: Verifica Super Meat Boy
      ansible.windows.win_stat:
        path: '{{ caph_binary_path }}'
      register: caph_binary

    - name: Verifica arquivo local
      ansible.builtin.stat:
        path: '{{ caph_local_path }}'
      register: local_file
      delegate_to: localhost

    - name: Falha se arquivo local nao encontrado
      ansible.builtin.fail:
        msg: Arquivo local nao encontrado em {{ caph_local_path }}.
      when: not local_file.stat.exists

    - name: Copia arquivo para maquina remota
      ansible.windows.win_copy:
        src: '{{ caph_local_path }}'
        dest: '{{ caph_remote_path }}'
      when: not caph_binary.stat.exists

    - name: Cria diretorio de instalacao
      ansible.windows.win_file:
        path: '{{ caph_install_dir }}'
        state: directory
      when: not caph_binary.stat.exists

    - name: Extrai arquivo zip
      ansible.windows.win_shell: '& "{{ seven_zip_binary_path }}" x -aoa -o"{{ caph_install_dir }}" "{{ caph_remote_path }}"'
      args:
        creates: '{{ caph_binary_path }}'
      when: not caph_binary.stat.exists

    - name: Remove arquivo zip
      ansible.windows.win_file:
        path: '{{ caph_remote_path }}'
        state: absent
      when: not caph_binary.stat.exists

    - name: Cria atalho na area de trabalho
      ansible.windows.win_shell: |
        $TargetFile = "{{ caph_binary_path }}"
        $ShortcutFile = "{{ caph_shortcut_path }}"
        $Path = "{{ caph_install_dir }}"
        $WScriptShell = New-Object -ComObject WScript.Shell
        $Shortcut = $WScriptShell.CreateShortcut($ShortcutFile)
        $Shortcut.TargetPath = $TargetFile
        $Shortcut.WorkingDirectory = $Path
        $Shortcut.Save()
      args:
        creates: '{{ caph_shortcut_path }}'
