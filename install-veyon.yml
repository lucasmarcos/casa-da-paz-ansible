- hosts: paz
  gather_facts: no
  tasks:
    - ansible.windows.win_get_url:
        url: '{{ veyon_installer_url }}'
        dest: '{{ veyon_installer_path }}'

    - ansible.windows.win_package:
        path: '{{ veyon_installer_path }}'
        arguments: /S /NoMaster
        state: present

    - ansible.windows.win_file:
        path: '{{ veyon_installer_path }}'
        state: absent
