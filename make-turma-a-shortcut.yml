- name: make turma-a
  hosts: paz
  gather_facts: false
  tasks:
     - name: remove atalho
       ansible.windows.win_file:
         path: C:\Users\User\Desktop\luanti-turma-a.lnk
         state: absent

     - name: Criar atalho do Luanti na area de tabralho
       ansible.windows.win_shell: |
         $TargetFile = "C:\Users\User\Desktop\Luanti\luanti-5.15.1-win64\bin\luanti.exe"
         $ShortcutFile = "C:\Users\User\Desktop\luanti-turma-a.lnk"
         $WScriptShell = New-Object -ComObject WScript.Shell
         $Shortcut = $WScriptShell.CreateShortcut($ShortcutFile)
         $Shortcut.TargetPath = $TargetFile
         $Shortcut.Arguments = "--go --address chromebook --name {{ inventory_hostname }}"
         $Shortcut.WorkingDirectory = "C:\Users\User\Desktop\Luanti\luanti-5.15.1-win64\bin"
         $Shortcut.Save()
