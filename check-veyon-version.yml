- name: Check Veyon version
  hosts: paz
  gather_facts: false
  tasks:
    - name: Verificar versao do Veyon
      ansible.windows.win_shell: |
        (Get-ItemProperty "C:\Program Files\Veyon\veyon-service.exe").VersionInfo.FileVersion
      args:
        executable: powershell
      register: veyon_version

    - name: Exibir versao
      ansible.builtin.debug:
        msg: "{{ veyon_version.stdout }}"
