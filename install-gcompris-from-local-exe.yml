- name: Install GCompris from local exe
  hosts: paz
  gather_facts: false
  tasks:
    - name: Verificar instalador local
      ansible.windows.win_stat:
        path: '{{ gcompris_local_exe_path }}'
      register: gcompris_installer

    - name: Falhar se instalador local nao encontrado
      ansible.builtin.fail:
        msg: Instalador local do GCompris nao encontrado em {{ gcompris_local_exe_path }}.
      when: not gcompris_installer.stat.exists

    - name: Instalar GCompris
      ansible.windows.win_package:
        path: '{{ gcompris_local_exe_path }}'
        arguments: /S
        state: present
      when: gcompris_installer.stat.exists
