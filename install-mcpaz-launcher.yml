- hosts: paz
  gather_facts: no
  tasks:
    - name: Verificar se o javaw do Temurin existe
      ansible.windows.win_stat:
        path: '{{ temurin_javaw_path }}'
      register: temurin_javaw_binary

    - name: Falhar se o Java nao estiver instalado
      ansible.builtin.fail:
        msg: Java nao encontrado em {{ temurin_javaw_path }}. Rode install-temurin-jre.yml antes de instalar o mcpaz.
      when: not temurin_javaw_binary.stat.exists

    - name: Criar diretorio temporario do mcpaz
      ansible.windows.win_file:
        path: '{{ mcpaz_temp_dir }}'
        state: directory

    - name: Criar diretorio do mcpaz
      ansible.windows.win_file:
        path: '{{ mcpaz_dir }}'
        state: directory

    - name: Verificar se o node atual existe
      ansible.windows.win_stat:
        path: '{{ mcpaz_dir }}\node\node.exe'
      register: existing_node_binary

    - name: Ler versao atual do Node.js
      ansible.windows.win_shell: |
        & '{{ mcpaz_dir }}\node\node.exe' --version
      register: existing_node_version
      failed_when: false
      changed_when: false
      when: existing_node_binary.stat.exists

    - name: Copiar arquivos do mcpaz
      ansible.windows.win_copy:
        src: mcpaz/
        dest: '{{ mcpaz_dir }}\'
      register: mcpaz_files

    - name: Baixar Node.js em zip
      ansible.windows.win_get_url:
        url: '{{ node_zip_url }}'
        dest: '{{ node_zip_path }}'
      when: not existing_node_binary.stat.exists or existing_node_version.stdout | trim != 'v{{ node_version }}'

    - name: Desbloquear zip do Node.js
      ansible.windows.win_shell: |
        Unblock-File -LiteralPath '{{ node_zip_path }}'
      when: not existing_node_binary.stat.exists or existing_node_version.stdout | trim != 'v{{ node_version }}'

    - name: Remover diretorio temporario extraido antigo do Node.js
      ansible.windows.win_file:
        path: '{{ mcpaz_temp_dir }}\{{ node_dist_dir }}'
        state: absent
      when: not existing_node_binary.stat.exists or existing_node_version.stdout | trim != 'v{{ node_version }}'

    - name: Extrair Node.js
      ansible.windows.win_shell: |
        Expand-Archive -LiteralPath '{{ node_zip_path }}' -DestinationPath '{{ mcpaz_temp_dir }}' -Force
      args:
        creates: '{{ mcpaz_temp_dir }}\{{ node_dist_dir }}\node.exe'
      when: not existing_node_binary.stat.exists or existing_node_version.stdout | trim != 'v{{ node_version }}'

    - name: Desbloquear arquivos extraidos do Node.js
      ansible.windows.win_shell: |
        Get-ChildItem -LiteralPath '{{ mcpaz_temp_dir }}\{{ node_dist_dir }}' -Recurse -File |
          Unblock-File
      when: not existing_node_binary.stat.exists or existing_node_version.stdout | trim != 'v{{ node_version }}'

    - name: Remover Node.js antigo do mcpaz
      ansible.windows.win_file:
        path: '{{ mcpaz_dir }}\node'
        state: absent
      when: existing_node_binary.stat.exists and existing_node_version.stdout | trim != 'v{{ node_version }}'

    - name: Mover Node.js para o diretorio do mcpaz
      ansible.windows.win_shell: |
        Move-Item -Path '{{ mcpaz_temp_dir }}\{{ node_dist_dir }}' -Destination '{{ mcpaz_dir }}\node'
      when: not existing_node_binary.stat.exists or existing_node_version.stdout | trim != 'v{{ node_version }}'

    - name: Garantir JAVA_PATH no .env.local
      ansible.windows.win_shell: |
        $envLocalPath = '{{ mcpaz_dir }}\.env.local'
        $javaLine = 'JAVA_PATH={{ temurin_javaw_path }}'

        if (Test-Path -LiteralPath $envLocalPath) {
          $lines = Get-Content -LiteralPath $envLocalPath
          $hasJavaLine = $false
          $updatedLines = foreach ($line in $lines) {
            if ($line -match '^JAVA_PATH=') {
              $hasJavaLine = $true
              $javaLine
            } else {
              $line
            }
          }

          if (-not $hasJavaLine) {
            $updatedLines += $javaLine
          }
        } else {
          $updatedLines = @($javaLine)
        }

        Set-Content -LiteralPath $envLocalPath -Value $updatedLines -Encoding UTF8

    - name: Verificar se node_modules existe
      ansible.windows.win_stat:
        path: '{{ mcpaz_dir }}\node_modules'
      register: node_modules_dir

    - name: Instalar dependencias npm do mcpaz quando necessario
      ansible.windows.win_command: >-
        {{ mcpaz_dir }}\node\npm.cmd install
      args:
        chdir: '{{ mcpaz_dir }}'
      when:
        - not node_modules_dir.stat.exists or mcpaz_files.changed or not existing_node_binary.stat.exists or existing_node_version.stdout | trim != 'v{{ node_version }}'

    - name: Conceder permissao de escrita e execucao para usuarios locais no mcpaz
      ansible.windows.win_shell: |
        icacls '{{ mcpaz_dir }}' /grant '*S-1-5-32-545:(OI)(CI)M' /T /C
      args:
        chdir: '{{ mcpaz_dir }}'
      when: mcpaz_files.changed or not node_modules_dir.stat.exists or not existing_node_binary.stat.exists or (existing_node_version.stdout | trim) != 'v' + node_version

    - name: Remover zip temporario do Node.js
      ansible.windows.win_file:
        path: '{{ node_zip_path }}'
        state: absent

    - name: Remover diretorio temporario extraido do Node.js
      ansible.windows.win_file:
        path: '{{ mcpaz_temp_dir }}\{{ node_dist_dir }}'
        state: absent
